apiVersion: apps/v1
kind: Deployment
metadata:
  name: spro-deployment
  labels:
    app: spro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spro
  template:
    metadata:
      labels:
        app: spro
      annotations:
        # OBSERVABILITY: These tell the Prometheus Operator to scrape your Flask metrics
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "5000"
    spec:
      containers:
      - name: spro
        image: sre-app:v1.0.4
        # SRE TIP: 'Never' ensures Kind uses the image you loaded via 'kind load'
        imagePullPolicy: Never 
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: spro-service
spec:
  selector:
    app: spro
  ports:
    - protocol: TCP
      port: 80       # External Port (The 'Phone Number')
      targetPort: 5000 # Internal Port (The 'Extension' to your Flask app)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spro-ingress
  annotations:
    # This annotation allows the app to handle paths like /health and /metrics directly
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: myapp.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: spro-service
            port:
              number: 80
