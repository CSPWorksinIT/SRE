apiVersion: apps/v1
kind: Deployment
metadata:
  name: spro-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spro
  template:
    metadata:
      labels:
        app: spro
    spec:
      containers:
      - name: spro
        image: sre-app:v1.0.4
        imagePullPolicy: Never
        ports:
        - containerPort: 5000 # MATCHES Flask port=5000
---
apiVersion: v1
kind: Service
metadata:
  name: spro-service
spec:
  selector:
    app: spro
  ports:
    - protocol: TCP
      port: 80       # The Service stays on 80 for convenience
      targetPort: 5000 # REDIRECTS traffic to Flask on 5000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spro-ingress
  annotations:
    # We remove the rewrite-target for a multi-path app 
    # so that /health goes to /health and /metrics goes to /metrics
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: myapp.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: spro-service
            port:
              number: 80
